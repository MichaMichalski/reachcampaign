        '200':
          description: Webhook updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhook'
        '404':
          description: Webhook not found
    delete:
      tags: [Webhooks]
      summary: Delete a webhook
      operationId: deleteWebhook
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Webhook deleted
        '404':
          description: Webhook not found

  /webhooks/bounce:
    post:
      tags: [Webhooks]
      summary: Bounce/complaint webhook receiver
      operationId: handleBounceWebhook
      security: []
      description: |
        Receives bounce and complaint notifications from email providers (SendGrid, Mailgun, AWS SES).
        Authenticated via `x-webhook-secret` header or `secret` query parameter matching `WEBHOOK_SECRET` env var.
      parameters:
        - name: x-webhook-secret
          in: header
          schema:
            type: string
        - name: secret
          in: query
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: array
                  description: SendGrid events
                  items:
                    type: object
                    properties:
                      event:
                        type: string
                      email:
                        type: string
                      sg_message_id:
                        type: string
                      reason:
                        type: string
                      type:
                        type: string
                - type: object
                  description: Mailgun event
                  properties:
                    event-data:
                      type: object
                - type: object
                  description: AWS SES notification
                  properties:
                    Type:
                      type: string
                    notificationType:
                      type: string
      responses:
        '200':
          description: Webhook received
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
        '401':
          description: Invalid webhook secret

  # ══════════════════════════════════════════════
  # SCORING RULES
  # ══════════════════════════════════════════════
  /scoring-rules:
    get:
      tags: [Scoring Rules]
      summary: List scoring rules
      operationId: listScoringRules
      responses:
        '200':
          description: List of scoring rules
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoringRule'
    post:
      tags: [Scoring Rules]
      summary: Create a scoring rule
      operationId: createScoringRule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoringRuleCreate'
            examples:
              emailOpen:
                summary: Points for email opens
                value:
                  name: Email Open
                  eventType: EMAIL_OPEN
                  points: 5
              formSubmit:
                summary: Points for form submissions
                value:
                  name: Form Submission
                  eventType: FORM_SUBMIT
                  points: 20
      responses:
        '201':
          description: Scoring rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringRule'

  /scoring-rules/{id}:
    put:
      tags: [Scoring Rules]
      summary: Update a scoring rule
      operationId: updateScoringRule
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoringRuleUpdate'
      responses:
        '200':
          description: Scoring rule updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoringRule'
        '404':
          description: Scoring rule not found
    delete:
      tags: [Scoring Rules]
      summary: Delete a scoring rule
      operationId: deleteScoringRule
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Scoring rule deleted
        '404':
          description: Scoring rule not found

