openapi: 3.1.0
info:
  title: ReachCampaign API
  description: |
    Full REST API for ReachCampaign – an email marketing, landing page, form, and campaign automation platform built with GrapeJS editors.

    ## Authentication
    All endpoints (except public ones like form submission, tracking, and previews) require authentication via one of:
    - **API Key**: Pass `x-api-key` header with a valid key created under Settings → API Keys.
    - **Session Cookie**: Browser session via NextAuth (cookie-based).

    ## GrapeJS Integration
    Email templates and landing pages store both the GrapeJS editor state (`designJson`) and the rendered output (`htmlContent`).
    When creating or updating via the API, you can pass the full GrapeJS project data as `designJson` and the rendered HTML as `htmlContent`.
    This allows headless creation of templates and pages without the visual editor.

    ## Pagination
    List endpoints that support pagination accept `page` (default 1) and `perPage` (default 20, max 100) query parameters.
    Responses include a `meta` or `pagination` object with `total`, `page`, `perPage`, and `totalPages`.
  version: 1.0.0
  contact:
    name: ReachCampaign Support

servers:
  - url: /api/v1
    description: API v1

security:
  - ApiKeyAuth: []
  - SessionAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    SessionAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    PaginationMeta:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        perPage:
          type: integer
        totalPages:
          type: integer

    # ─── Contact ───
    Contact:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        company:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        customFields:
          type: object
          additionalProperties: true
        score:
          type: integer
        doNotContact:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: object
            properties:
              contactId:
                type: string
              tagId:
                type: string
              tag:
                $ref: '#/components/schemas/Tag'

    ContactCreate:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        company:
          type: string
        title:
          type: string
        customFields:
          type: object
          additionalProperties: true
        tags:
          type: array
          items:
            type: string
          description: Array of tag IDs to assign

    ContactUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        company:
          type: string
        title:
          type: string
        customFields:
          type: object
          additionalProperties: true
        score:
          type: integer
        doNotContact:
          type: boolean
        tags:
          type: array
          items:
            type: string
          description: Array of tag IDs (replaces existing tags)

    # ─── Tag ───
    Tag:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
        createdAt:
          type: string
          format: date-time

    TagCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          default: '#6366f1'

    TagUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'

    # ─── Contact Note ───
    ContactNote:
      type: object
      properties:
        id:
          type: string
        contactId:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ContactNoteCreate:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    # ─── Segment ───
    FilterRule:
      type: object
      required: [field, operator]
      properties:
        field:
          type: string
        operator:
          type: string
          enum: [equals, not_equals, contains, greater_than, less_than, is_empty, is_not_empty]
        value:
          description: Comparison value (type depends on field and operator)

    Segment:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        type:
          type: string
          enum: [DYNAMIC, STATIC]
        filters:
          type: array
          items:
            $ref: '#/components/schemas/FilterRule'
        memberCount:
          type: integer
          description: Computed member count
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SegmentCreate:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        type:
          type: string
          enum: [DYNAMIC, STATIC]
        filters:
          type: array
          items:
            $ref: '#/components/schemas/FilterRule'

    SegmentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        filters:
          type: array
          items:
            $ref: '#/components/schemas/FilterRule'

    SegmentMembersModify:
      type: object
      required: [contactIds]
      properties:
        contactIds:
          type: array
          items:
            type: string
          minItems: 1

    # ─── Email Template ───
    EmailTemplate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        subject:
          type: string
        previewText:
          type: string
          nullable: true
        designJson:
          type: object
          additionalProperties: true
          description: GrapeJS project data (editor state). Pass the full project JSON to recreate the design.
        htmlContent:
          type: string
          description: Rendered HTML output (with inlined CSS for emails). Can be generated from GrapeJS or provided directly.
        textContent:
          type: string
          nullable: true
          description: Plain-text version of the email
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EmailTemplateCreate:
      type: object
      required: [name, subject]
      properties:
        name:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        previewText:
          type: string
        designJson:
          type: object
          additionalProperties: true
          description: GrapeJS project data. Use `editor.getProjectData()` output or build manually.
          default: {}
        htmlContent:
          type: string
          description: Rendered HTML with inlined styles. Use `editor.runCommand('gjs-get-inlined-html')` output or provide raw HTML.
          default: ''
        textContent:
          type: string

    EmailTemplateUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        subject:
          type: string
          minLength: 1
        previewText:
          type: string
        designJson:
          type: object
          additionalProperties: true
          description: GrapeJS project data
        htmlContent:
          type: string
        textContent:
          type: string

    # ─── Email Campaign ───
    EmailCampaign:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        templateId:
          type: string
        template:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            subject:
              type: string
        segmentIds:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [DRAFT, SCHEDULED, SENDING, SENT, CANCELLED]
        scheduledAt:
          type: string
          format: date-time
          nullable: true
        sentAt:
          type: string
          format: date-time
          nullable: true
        totalRecipients:
          type: integer
        totalSent:
          type: integer
        totalOpened:
          type: integer
        totalClicked:
          type: integer
        totalBounced:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EmailCampaignCreate:
      type: object
      required: [name, templateId, segmentIds]
      properties:
        name:
          type: string
          minLength: 1
        templateId:
          type: string
          minLength: 1
          description: ID of the email template to send
        segmentIds:
          type: array
          items:
            type: string
          minItems: 1
          description: IDs of segments whose contacts will receive the email
        scheduledAt:
          type: string
          format: date-time
          description: If provided, schedules the campaign. If omitted, sends immediately.

    EmailCampaignUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        templateId:
          type: string
          minLength: 1
          description: Change the email template (only for DRAFT/SCHEDULED campaigns)
        segmentIds:
          type: array
          items:
            type: string
          minItems: 1
        scheduledAt:
          type: string
          format: date-time

    # ─── Landing Page ───
    LandingPage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        designJson:
          type: object
          additionalProperties: true
          description: GrapeJS project data (editor state)
        htmlContent:
          type: string
          description: Rendered HTML with embedded CSS
        metaTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        ogImage:
          type: string
          nullable: true
        published:
          type: boolean
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LandingPageCreate:
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
          description: URL-friendly identifier (must be unique)
        designJson:
          type: object
          additionalProperties: true
          description: GrapeJS project data. Use `editor.getProjectData()` output or build manually.
          default: {}
        htmlContent:
          type: string
          description: Rendered HTML with `<style>` block. Use `editor.getHtml()` + `editor.getCss()` or provide raw HTML.
          default: ''
        metaTitle:
          type: string
        metaDescription:
          type: string
        ogImage:
          type: string

    LandingPageUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        slug:
          type: string
          minLength: 1
        designJson:
          type: object
          additionalProperties: true
        htmlContent:
          type: string
        metaTitle:
          type: string
          nullable: true
        metaDescription:
          type: string
          nullable: true
        ogImage:
          type: string
          nullable: true

    # ─── Form ───
    FormField:
      type: object
      required: [id, label, type]
      properties:
        id:
          type: string
          description: Unique field identifier used as key in submission data
        label:
          type: string
          minLength: 1
        type:
          type: string
          enum: [text, email, number, textarea, select, checkbox, radio]
        required:
          type: boolean
          default: false
        placeholder:
          type: string
        options:
          type: array
          items:
            type: string
          description: Options for select/radio/checkbox fields

    Form:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        landingPageId:
          type: string
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
        successMessage:
          type: string
        redirectUrl:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            submissions:
              type: integer

    FormCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        landingPageId:
          type: string
          description: Optionally link to a landing page
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
          default: []
        successMessage:
          type: string
          default: Thank you for your submission!
        redirectUrl:
          type: string
          format: uri
          description: Redirect URL after submission (or empty string for no redirect)

    FormUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        landingPageId:
          type: string
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
        successMessage:
          type: string
        redirectUrl:
          type: string
          nullable: true

    FormSubmission:
      type: object
      properties:
        id:
          type: string
        formId:
          type: string
        contactId:
          type: string
          nullable: true
        data:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        contact:
          type: object
          nullable: true
          properties:
            id:
              type: string
            email:
              type: string
            firstName:
              type: string
            lastName:
              type: string

    # ─── Campaign (Automation Workflow) ───
    CampaignNode:
      type: object
      required: [type, label]
      properties:
        type:
          type: string
          enum: [TRIGGER, CONDITION, ACTION, DELAY]
        label:
          type: string
          minLength: 1
        config:
          type: object
          additionalProperties: true
          description: |
            Node-specific configuration. Depends on type:
            - TRIGGER: `{ triggerType: "segment_entry"|"form_submit"|"tag_added"|"event", segmentId?, formId?, tagId?, eventName? }`
            - CONDITION: `{ conditionType: "has_tag"|"in_segment"|"score_above"|"field_equals", tagId?, segmentId?, threshold?, field?, value? }`
            - ACTION: `{ actionType: "send_email"|"add_tag"|"remove_tag"|"update_field"|"add_to_segment"|"webhook", templateId?, tagId?, segmentId?, field?, value?, webhookUrl? }`
            - DELAY: `{ delayType: "fixed"|"until_date", delayValue?, delayUnit?: "minutes"|"hours"|"days", untilDate? }`
          default: {}
        positionX:
          type: number
          description: X coordinate in the workflow editor canvas
          default: 0
        positionY:
          type: number
          description: Y coordinate in the workflow editor canvas
          default: 0
        templateId:
          type: string
          nullable: true
          description: Email template ID (for send_email actions)
        segmentId:
          type: string
          nullable: true
          description: Segment ID (for segment-related triggers/conditions/actions)

    CampaignEdge:
      type: object
      required: [sourceNodeIndex, targetNodeIndex]
      properties:
        sourceNodeIndex:
          type: integer
          description: Index into the nodes array (0-based)
        targetNodeIndex:
          type: integer
          description: Index into the nodes array (0-based)
        label:
          type: string
          description: Edge label (e.g. "Yes"/"No" for condition branches)

    Campaign:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [DRAFT, ACTIVE, PAUSED, COMPLETED]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              campaignId:
                type: string
              type:
                type: string
                enum: [TRIGGER, CONDITION, ACTION, DELAY]
              label:
                type: string
              config:
                type: object
                additionalProperties: true
              positionX:
                type: number
              positionY:
                type: number
              templateId:
                type: string
                nullable: true
              segmentId:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
        edges:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              campaignId:
                type: string
              sourceNodeId:
                type: string
              targetNodeId:
                type: string
              label:
                type: string
                nullable: true
              createdAt:
                type: string
                format: date-time

    CampaignCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/CampaignNode'
          default: []
        edges:
          type: array
          items:
            $ref: '#/components/schemas/CampaignEdge'
          default: []

    CampaignUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/CampaignNode'
          description: If provided, all existing nodes and edges are replaced
        edges:
          type: array
          items:
            $ref: '#/components/schemas/CampaignEdge'
          description: Only used when nodes is also provided

    # ─── Settings ───
    SendingDomain:
      type: object
      properties:
        id:
          type: string
        domain:
          type: string
        dkimSelector:
          type: string
          nullable: true
          description: DKIM DNS label (left of ._domainkey); set from your mail host for verification
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED, PAUSED]
        spfValid:
          type: boolean
        dkimValid:
          type: boolean
        dmarcValid:
          type: boolean
        maxDailyVolume:
          type: integer
        dailySent:
          type: integer
        bounceRate:
          type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        warmup:
          $ref: '#/components/schemas/DomainWarmup'

    DomainWarmup:
      type: object
      properties:
        id:
          type: string
        domainId:
          type: string
        enabled:
          type: boolean
        currentDay:
          type: integer
        dailyTarget:
          type: integer
        rampPercentage:
          type: integer
        maxTarget:
          type: integer
        startedAt:
          type: string
          format: date-time

    DomainCreate:
      type: object
      required: [domain]
      properties:
        domain:
          type: string
          minLength: 3
          pattern: '^[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$'

    DomainUpdate:
      type: object
      properties:
        maxDailyVolume:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [PENDING, VERIFIED, FAILED, PAUSED]
        dkimSelector:
          type: string
          nullable: true
          maxLength: 63
          pattern: '^[a-zA-Z0-9]([a-zA-Z0-9._-]*[a-zA-Z0-9])?$'
          description: DKIM selector from your mail host; omit or null to clear

    EmailProvider:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [SMTP, SENDGRID, AWS_SES, MAILGUN, POSTMARK]
        config:
          type: object
          additionalProperties: true
          description: Provider configuration (sensitive fields are masked in responses)
        weight:
          type: integer
        priority:
          type: integer
        enabled:
          type: boolean
        strategy:
          type: string
          enum: [ROUND_ROBIN, WEIGHTED, FAILOVER]
        dailyLimit:
          type: integer
        hourlylimit:
          type: integer
        dailySent:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProviderCreate:
      type: object
      required: [name, type, config]
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [SMTP, SENDGRID, AWS_SES, MAILGUN, POSTMARK]
        config:
          type: object
          additionalProperties: true
          description: |
            Provider-specific configuration:
            - SMTP: `{ host, port, secure, user, pass }`
            - SENDGRID: `{ apiKey }`
            - AWS_SES: `{ accessKeyId, secretAccessKey, region }`
            - MAILGUN: `{ apiKey, domain }`
            - POSTMARK: `{ serverToken }`
        weight:
          type: integer
          minimum: 1
        priority:
          type: integer
          minimum: 0
        strategy:
          type: string
          enum: [ROUND_ROBIN, WEIGHTED, FAILOVER]
        dailyLimit:
          type: integer
          minimum: 1
        hourlyLimit:
          type: integer
          minimum: 1
        domainIds:
          type: array
          items:
            type: string
          description: IDs of sending domains to associate

    ProviderUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        type:
          type: string
          enum: [SMTP, SENDGRID, AWS_SES, MAILGUN, POSTMARK]
        config:
          type: object
          additionalProperties: true
        weight:
          type: integer
          minimum: 1
        priority:
          type: integer
          minimum: 0
        strategy:
          type: string
          enum: [ROUND_ROBIN, WEIGHTED, FAILOVER]
        dailyLimit:
          type: integer
          minimum: 1
        hourlyLimit:
          type: integer
          minimum: 1
        enabled:
          type: boolean
        domainIds:
          type: array
          items:
            type: string

    # ─── API Keys ───
    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        maskedKey:
          type: string
        lastUsed:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    ApiKeyCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        expiresAt:
          type: string
          format: date-time

    ApiKeyCreated:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: The full API key (only shown once at creation)
        createdAt:
          type: string
          format: date-time

    # ─── Webhooks ───
    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [contact.created, contact.updated, email.sent, email.opened, email.bounced, form.submitted, campaign.completed]
        secret:
          type: string
          nullable: true
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    WebhookCreate:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [contact.created, contact.updated, email.sent, email.opened, email.bounced, form.submitted, campaign.completed]
          minItems: 1
        secret:
          type: string
          minLength: 8

    WebhookUpdate:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [contact.created, contact.updated, email.sent, email.opened, email.bounced, form.submitted, campaign.completed]
          minItems: 1
        secret:
          type: string
          minLength: 8
        enabled:
          type: boolean

    # ─── Scoring Rules ───
    ScoringRule:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        eventType:
          type: string
          enum: [EMAIL_OPEN, EMAIL_CLICK, PAGE_VIEW, FORM_SUBMIT, CAMPAIGN_TRIGGER]
        points:
          type: integer
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ScoringRuleCreate:
      type: object
      required: [name, eventType, points]
      properties:
        name:
          type: string
          minLength: 1
        eventType:
          type: string
          enum: [EMAIL_OPEN, EMAIL_CLICK, PAGE_VIEW, FORM_SUBMIT, CAMPAIGN_TRIGGER]
        points:
          type: integer
        enabled:
          type: boolean

    ScoringRuleUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        eventType:
          type: string
          enum: [EMAIL_OPEN, EMAIL_CLICK, PAGE_VIEW, FORM_SUBMIT, CAMPAIGN_TRIGGER]
        points:
          type: integer
        enabled:
          type: boolean

    # ─── Tracking ───
    TrackingEvent:
      type: object
      properties:
        id:
          type: string
        contactId:
          type: string
          nullable: true
        type:
          type: string
          enum: [EMAIL_OPEN, EMAIL_CLICK, PAGE_VIEW, FORM_SUBMIT, CAMPAIGN_TRIGGER]
        data:
          type: object
          additionalProperties: true
        ip:
          type: string
          nullable: true
        userAgent:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        contact:
          type: object
          nullable: true
          properties:
            id:
              type: string
            email:
              type: string
            firstName:
              type: string
            lastName:
              type: string

    PageView:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        referrer:
          type: string
        title:
          type: string
        contactId:
          type: string
          nullable: true
        event:
          type: string
        data:
          type: object
          additionalProperties: true

  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PerPageParam:
      name: perPage
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string

paths:
  # ══════════════════════════════════════════════
  # CONTACTS
  # ══════════════════════════════════════════════
  /contacts:
    get:
      tags: [Contacts]
      summary: List contacts
      operationId: listContacts
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
        - name: search
          in: query
          schema:
            type: string
          description: Search by email, first name, or last name
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag name
        - name: sortBy
          in: query
          schema:
            type: string
            default: createdAt
          description: Field to sort by
        - name: sortOrder
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        '200':
          description: Paginated list of contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
    post:
      tags: [Contacts]
      summary: Create a contact
      operationId: createContact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactCreate'
      responses:
        '201':
          description: Contact created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /contacts/{id}:
    get:
      tags: [Contacts]
      summary: Get a contact
      operationId: getContact
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Contact with tags, notes, and tracking events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '404':
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Contacts]
      summary: Update a contact
      operationId: updateContact
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactUpdate'
      responses:
        '200':
          description: Contact updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Contact'
        '404':
          description: Contact not found
        '409':
          description: Email already exists
    delete:
      tags: [Contacts]
      summary: Delete a contact
      operationId: deleteContact
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Contact deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '404':
          description: Contact not found

  /contacts/{id}/notes:
    get:
      tags: [Contacts]
      summary: List notes for a contact
      operationId: listContactNotes
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: List of notes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ContactNote'
        '404':
          description: Contact not found
    post:
      tags: [Contacts]
      summary: Add a note to a contact
      operationId: createContactNote
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContactNoteCreate'
      responses:
        '201':
          description: Note created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactNote'
        '404':
          description: Contact not found

  /contacts/import:
    post:
      tags: [Contacts]
      summary: Import contacts from CSV
      operationId: importContacts
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: |
                    CSV file with headers. Recognized columns:
                    `email`, `first_name`/`firstName`, `last_name`/`lastName`, `phone`, `company`, `title`
      responses:
        '200':
          description: Import results
          content:
            application/json:
              schema:
                type: object
                properties:
                  imported:
                    type: integer
                  skipped:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string

  /contacts/export:
    get:
      tags: [Contacts]
      summary: Export contacts as CSV
      operationId: exportContacts
      parameters:
        - name: segmentId
          in: query
          schema:
            type: string
          description: Filter by segment ID
        - name: tag
          in: query
          schema:
            type: string
          description: Filter by tag name
      responses:
        '200':
          description: CSV file download
          content:
            text/csv:
              schema:
                type: string

  # ══════════════════════════════════════════════
  # TAGS
  # ══════════════════════════════════════════════
  /tags:
    get:
      tags: [Tags]
      summary: List all tags
      operationId: listTags
      responses:
        '200':
          description: List of tags with contact counts
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/Tag'
                    - type: object
                      properties:
                        _count:
                          type: object
                          properties:
                            contacts:
                              type: integer
    post:
      tags: [Tags]
      summary: Create a tag
      operationId: createTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagCreate'
      responses:
        '201':
          description: Tag created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '409':
          description: Tag name already exists

  /tags/{id}:
    put:
      tags: [Tags]
      summary: Update a tag
      operationId: updateTag
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TagUpdate'
      responses:
        '200':
          description: Tag updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tag'
        '404':
          description: Tag not found
        '409':
          description: Tag name already exists
    delete:
      tags: [Tags]
      summary: Delete a tag
      operationId: deleteTag
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Tag deleted
        '404':
          description: Tag not found

  # ══════════════════════════════════════════════
  # SEGMENTS
  # ══════════════════════════════════════════════
  /segments:
    get:
      tags: [Segments]
      summary: List all segments
      operationId: listSegments
      responses:
        '200':
          description: List of segments with computed member counts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Segment'
    post:
      tags: [Segments]
      summary: Create a segment
      operationId: createSegment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentCreate'
      responses:
        '201':
          description: Segment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'

  /segments/{id}:
    get:
      tags: [Segments]
      summary: Get a segment
      operationId: getSegment
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Segment with member count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'
        '404':
          description: Segment not found
    put:
      tags: [Segments]
      summary: Update a segment
      operationId: updateSegment
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentUpdate'
      responses:
        '200':
          description: Segment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Segment'
        '404':
          description: Segment not found
    delete:
      tags: [Segments]
      summary: Delete a segment
      operationId: deleteSegment
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Segment deleted
        '404':
          description: Segment not found

  /segments/{id}/members:
    get:
      tags: [Segments]
      summary: List segment members
      operationId: listSegmentMembers
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PerPageParam'
      responses:
        '200':
          description: Paginated list of contacts in the segment
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Contact'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '404':
          description: Segment not found
    post:
      tags: [Segments]
      summary: Add members to a static segment
      operationId: addSegmentMembers
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentMembersModify'
      responses:
        '200':
          description: Members added
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  memberCount:
                    type: integer
        '400':
          description: Cannot add members to dynamic segment
        '404':
          description: Segment not found
    delete:
      tags: [Segments]
      summary: Remove members from a static segment
      operationId: removeSegmentMembers
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SegmentMembersModify'
      responses:
        '200':
          description: Members removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  memberCount:
                    type: integer
        '400':
          description: Cannot remove members from dynamic segment
        '404':
          description: Segment not found

  # ══════════════════════════════════════════════
  # EMAIL TEMPLATES
  # ══════════════════════════════════════════════
  /emails:
    get:
      tags: [Email Templates]
      summary: List all email templates
      operationId: listEmailTemplates
      responses:
        '200':
          description: List of email templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailTemplate'
    post:
      tags: [Email Templates]
      summary: Create an email template
      operationId: createEmailTemplate
      description: |
        Create an email template with GrapeJS design data and/or raw HTML.

        To create a template programmatically without the visual editor, provide:
        - `htmlContent`: Your complete HTML email markup with inlined CSS
        - `designJson`: Optional GrapeJS project data (if you want the template to be editable in the visual editor later)

        The `designJson` field accepts the exact JSON structure produced by `editor.getProjectData()` in GrapeJS.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTemplateCreate'
            examples:
              minimalTemplate:
                summary: Minimal template with HTML only
                value:
                  name: Welcome Email
                  subject: "Welcome to {{company}}"
                  htmlContent: "<html><body><h1>Welcome!</h1><p>Hello {{firstName}}</p></body></html>"
              fullTemplate:
                summary: Full template with GrapeJS design data
                value:
                  name: Newsletter Template
                  subject: "Weekly Newsletter"
                  previewText: "This week's highlights"
                  htmlContent: "<html><body>...</body></html>"
                  designJson:
                    assets: []
                    styles: []
                    pages:
                      - component: "<body>...</body>"
                        id: "page-1"
                  textContent: "Plain text version of the email"
      responses:
        '201':
          description: Email template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplate'

  /emails/{id}:
    get:
      tags: [Email Templates]
      summary: Get an email template
      operationId: getEmailTemplate
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Email template with full design data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplate'
        '404':
          description: Template not found
    put:
      tags: [Email Templates]
      summary: Update an email template
      operationId: updateEmailTemplate
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailTemplateUpdate'
      responses:
        '200':
          description: Email template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailTemplate'
        '404':
          description: Template not found
    delete:
      tags: [Email Templates]
      summary: Delete an email template
      operationId: deleteEmailTemplate
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Template deleted
        '404':
          description: Template not found

  /emails/{id}/preview:
    get:
      tags: [Email Templates]
      summary: Preview rendered email HTML
      operationId: previewEmailTemplate
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
        - name: contactId
          in: query
          schema:
            type: string
          description: Contact ID for Handlebars variable substitution (firstName, lastName, email, company)
      responses:
        '200':
          description: Rendered HTML
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Template not found

  # ══════════════════════════════════════════════
  # EMAIL CAMPAIGNS
  # ══════════════════════════════════════════════
  /email-campaigns:
    get:
      tags: [Email Campaigns]
      summary: List all email campaigns
      operationId: listEmailCampaigns
      responses:
        '200':
          description: List of email campaigns with template info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EmailCampaign'
    post:
      tags: [Email Campaigns]
      summary: Create and send/schedule an email campaign
      operationId: createEmailCampaign
      description: |
        Creates an email campaign. If `scheduledAt` is provided, the campaign is scheduled for that time.
        If `scheduledAt` is omitted, the campaign starts sending immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailCampaignCreate'
            examples:
              sendNow:
                summary: Send immediately
                value:
                  name: February Newsletter
                  templateId: clx1234abc
                  segmentIds: [clx5678def]
              schedule:
                summary: Schedule for later
                value:
                  name: March Campaign
                  templateId: clx1234abc
                  segmentIds: [clx5678def, clx9012ghi]
                  scheduledAt: "2026-03-01T09:00:00.000Z"
      responses:
        '201':
          description: Email campaign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailCampaign'
        '404':
          description: Template not found

  /email-campaigns/{id}:
    get:
      tags: [Email Campaigns]
      summary: Get an email campaign
      operationId: getEmailCampaign
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Email campaign details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailCampaign'
        '404':
          description: Campaign not found
    put:
      tags: [Email Campaigns]
      summary: Update an email campaign
      operationId: updateEmailCampaign
      description: Only DRAFT or SCHEDULED campaigns can be updated.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailCampaignUpdate'
      responses:
        '200':
          description: Email campaign updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailCampaign'
        '400':
          description: Campaign cannot be updated (wrong status)
        '404':
          description: Campaign or template not found
    delete:
      tags: [Email Campaigns]
      summary: Delete an email campaign
      operationId: deleteEmailCampaign
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Campaign deleted
        '404':
          description: Campaign not found

  /email-campaigns/{id}/cancel:
    post:
      tags: [Email Campaigns]
      summary: Cancel an email campaign
      operationId: cancelEmailCampaign
      description: Cancels a DRAFT, SCHEDULED, or SENDING campaign. Removes pending jobs from the queue.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Campaign cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                    enum: [CANCELLED]
        '400':
          description: Campaign cannot be cancelled (already SENT or CANCELLED)
        '404':
          description: Campaign not found

  # ══════════════════════════════════════════════
  # LANDING PAGES
  # ══════════════════════════════════════════════
  /pages:
    get:
      tags: [Landing Pages]
      summary: List all landing pages
      operationId: listLandingPages
      responses:
        '200':
          description: List of landing pages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LandingPage'
    post:
      tags: [Landing Pages]
      summary: Create a landing page
      operationId: createLandingPage
      description: |
        Create a landing page with GrapeJS design data and/or raw HTML.

        The `designJson` field accepts the exact JSON structure produced by `editor.getProjectData()` in GrapeJS.
        The `htmlContent` field should contain the full HTML including a `<style>` block.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LandingPageCreate'
            examples:
              simpleHtml:
                summary: Simple HTML page
                value:
                  name: Product Landing
                  slug: product-launch
                  htmlContent: "<style>body{font-family:sans-serif}</style><div><h1>Product Launch</h1></div>"
                  metaTitle: "Our New Product"
                  metaDescription: "Check out our latest product"
              withDesign:
                summary: Page with GrapeJS design data
                value:
                  name: Event Page
                  slug: summer-event
                  designJson:
                    assets: []
                    styles: []
                    pages:
                      - component: "<body>...</body>"
                        id: "page-1"
                  htmlContent: "<style>...</style><div>...</div>"
      responses:
        '201':
          description: Landing page created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LandingPage'
        '400':
          description: Slug already exists

  /pages/{id}:
    get:
      tags: [Landing Pages]
      summary: Get a landing page
      operationId: getLandingPage
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Landing page with forms
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/LandingPage'
                  - type: object
                    properties:
                      forms:
                        type: array
                        items:
                          $ref: '#/components/schemas/Form'
        '404':
          description: Page not found
    put:
      tags: [Landing Pages]
      summary: Update a landing page
      operationId: updateLandingPage
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LandingPageUpdate'
      responses:
        '200':
          description: Landing page updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LandingPage'
        '400':
          description: Slug already exists
        '404':
          description: Page not found
    delete:
      tags: [Landing Pages]
      summary: Delete a landing page
      operationId: deleteLandingPage
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Page deleted
        '404':
          description: Page not found

  /pages/{id}/preview:
    get:
      tags: [Landing Pages]
      summary: Preview rendered page HTML
      operationId: previewLandingPage
      security: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Rendered HTML
          content:
            text/html:
              schema:
                type: string
        '404':
          description: Page not found

  /pages/{id}/publish:
    post:
      tags: [Landing Pages]
      summary: Publish a landing page
      operationId: publishLandingPage
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Page published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LandingPage'
        '404':
          description: Page not found
    delete:
