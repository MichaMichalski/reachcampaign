    post:
      tags: [Forms]
      summary: Create a form
      operationId: createForm
      description: |
        Create a form with field definitions. Each field has an `id` that serves as the key in submission data.
        Supported field types: text, email, number, textarea, select, checkbox, radio.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FormCreate'
            examples:
              contactForm:
                summary: Contact form
                value:
                  name: Contact Us
                  description: Get in touch
                  fields:
                    - id: name
                      label: Your Name
                      type: text
                      required: true
                      placeholder: John Doe
                    - id: email
                      label: Email Address
                      type: email
                      required: true
                      placeholder: john@example.com
                    - id: message
                      label: Message
                      type: textarea
                      required: true
                    - id: topic
                      label: Topic
                      type: select
                      options: [General, Support, Sales, Partnership]
                  successMessage: "Thanks! We'll get back to you soon."
              newsletterSignup:
                summary: Newsletter signup
                value:
                  name: Newsletter Signup
                  landingPageId: clx1234abc
