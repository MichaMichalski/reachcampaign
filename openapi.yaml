  # ══════════════════════════════════════════════
  # CAMPAIGNS (AUTOMATION WORKFLOWS)
  # ══════════════════════════════════════════════
  /campaigns:
    get:
      tags: [Campaigns]
      summary: List all automation campaigns
      operationId: listCampaigns
      responses:
        '200':
          description: List of campaigns with node/log counts
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/Campaign'
                    - type: object
                      properties:
                        _count:
                          type: object
                          properties:
                            nodes:
                              type: integer
                            logs:
                              type: integer
    post:
      tags: [Campaigns]
      summary: Create an automation campaign
      operationId: createCampaign
      description: |
        Create an automation workflow with nodes and edges. Nodes are connected via edges using array indices.

        **Node types:**
        - `TRIGGER`: Entry point (segment_entry, form_submit, tag_added, event)
        - `CONDITION`: Branching logic (has_tag, in_segment, score_above, field_equals)
        - `ACTION`: Performs an action (send_email, add_tag, remove_tag, update_field, add_to_segment, webhook)
        - `DELAY`: Waits before proceeding (fixed duration or until a specific date)

        **Edge indexing:** Edges reference nodes by their 0-based index in the `nodes` array. For example, an edge with `sourceNodeIndex: 0` and `targetNodeIndex: 1` connects the first node to the second.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignCreate'
            examples:
              welcomeSequence:
                summary: Welcome email sequence
                value:
                  name: Welcome Sequence
                  description: Send welcome emails to new contacts
                  nodes:
                    - type: TRIGGER
                      label: New Contact in Segment
                      config:
                        triggerType: segment_entry
                        segmentId: clx1234abc
                      positionX: 250
                      positionY: 50
                      segmentId: clx1234abc
                    - type: ACTION
                      label: Send Welcome Email
                      config:
                        actionType: send_email
                        templateId: clx5678def
                      positionX: 250
                      positionY: 200
                      templateId: clx5678def
                    - type: DELAY
                      label: Wait 3 Days
                      config:
                        delayType: fixed
                        delayValue: 3
                        delayUnit: days
                      positionX: 250
                      positionY: 350
                    - type: ACTION
                      label: Send Follow-up
                      config:
                        actionType: send_email
                        templateId: clx9012ghi
                      positionX: 250
                      positionY: 500
                      templateId: clx9012ghi
                  edges:
                    - sourceNodeIndex: 0
                      targetNodeIndex: 1
                    - sourceNodeIndex: 1
                      targetNodeIndex: 2
                    - sourceNodeIndex: 2
                      targetNodeIndex: 3
      responses:
        '201':
          description: Campaign created with nodes and edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'

  /campaigns/{id}:
    get:
      tags: [Campaigns]
      summary: Get an automation campaign
      operationId: getCampaign
      description: Returns the campaign with all nodes, edges, and the last 50 execution logs.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Campaign with full workflow data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '404':
          description: Campaign not found
    put:
      tags: [Campaigns]
      summary: Update an automation campaign
      operationId: updateCampaign
      description: |
        Update campaign metadata and/or workflow. If `nodes` is provided, all existing nodes and edges
        are deleted and recreated from the provided data (full replacement strategy).
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CampaignUpdate'
      responses:
        '200':
          description: Campaign updated with nodes and edges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Campaign'
        '404':
          description: Campaign not found
    delete:
      tags: [Campaigns]
      summary: Delete an automation campaign
      operationId: deleteCampaign
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Campaign deleted
        '404':
          description: Campaign not found

  /campaigns/{id}/start:
    post:
      tags: [Campaigns]
      summary: Start an automation campaign
      operationId: startCampaign
      description: |
        Activates a DRAFT or PAUSED campaign. For TRIGGER nodes with `triggerType: "segment_entry"`,
        all current segment members are immediately enqueued for processing.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Campaign started
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                    enum: [ACTIVE]
        '400':
          description: Campaign cannot be started (wrong status)
        '404':
          description: Campaign not found

  /campaigns/{id}/pause:
    post:
      tags: [Campaigns]
      summary: Pause an automation campaign
      operationId: pauseCampaign
      description: Pauses an ACTIVE campaign. Can be resumed with start.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Campaign paused
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                    enum: [PAUSED]
        '400':
          description: Campaign is not active
        '404':
          description: Campaign not found

  /campaigns/{id}/stop:
    post:
      tags: [Campaigns]
      summary: Stop an automation campaign
      operationId: stopCampaign
      description: |
        Permanently stops a campaign. Sets status to COMPLETED, marks pending/processing logs as SKIPPED,
        and removes all queued jobs.
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Campaign stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  status:
                    type: string
                    enum: [COMPLETED]
        '400':
          description: Campaign is already completed
        '404':
          description: Campaign not found

